name: Build LEGO Remote APK

on:
  push:
    branches:
      - '**'
    paths:
      - 'lego_remote/**'
      - '.github/workflows/build-lego-remote-apk.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lego_remote
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: lego-remote-debug-apk
          path: lego_remote/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
